name: litratolink
description: Potoos — original memories, safely shared.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  archive: ^4.0.9
  crypto: ^3.0.7
  dio: ^5.9.2
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.1
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - env.properties
    - assets/branding/
    - assets/logo/
    - assets/mascot/
  fonts:
    - family: GeneralSans
      fonts:
        - asset: assets/fonts/general_sans/GeneralSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/general_sans/GeneralSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/general_sans/GeneralSans-Semibold.ttf
          weight: 600
        - asset: assets/fonts/general_sans/GeneralSans-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/InterVariable.ttf
          weight: 400
        - asset: assets/fonts/inter/InterVariable.ttf
          weight: 500
        - asset: assets/fonts/inter/InterVariable.ttf
          weight: 600
        - asset: assets/fonts/inter/InterVariable.ttf
          weight: 700
