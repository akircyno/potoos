name: litratolink
description: Potoos — original memories, safely shared.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  archive: ^4.0.9
  crypto: ^3.0.7
  dio: ^5.9.2
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.0.10+1
  sentry_flutter: ^8.13.2
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.12.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - env.properties
    - assets/branding/
    - assets/logo/
    - assets/logo/google_g.svg
    - assets/mascot/
  fonts:
    - family: GeneralSans
      fonts:
        - asset: assets/fonts/general_sans/GeneralSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/general_sans/GeneralSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/general_sans/GeneralSans-Semibold.ttf
          weight: 600
        - asset: assets/fonts/general_sans/GeneralSans-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/InterVariable.ttf
          weight: 400
        - asset: assets/fonts/inter/InterVariable.ttf
          weight: 500
        - asset: assets/fonts/inter/InterVariable.ttf
          weight: 600
        - asset: assets/fonts/inter/InterVariable.ttf
          weight: 700

flutter_launcher_icons:
  image_path: "assets/logo/potoos_logo.webp"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#21070D"
  adaptive_icon_foreground: "assets/logo/potoos_logo.webp"
  web:
    generate: true
    image_path: "assets/logo/potoos_logo.webp"
    background_color: "#21070D"
    theme_color: "#21070D"
  windows:
    generate: true
    image_path: "assets/logo/potoos_logo.webp"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/logo/potoos_logo.webp"
